<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Interactive Real-Time Fluid Simulation</title>
<style>
  :root{--panel:rgba(8,10,18,.84);--line:rgba(255,255,255,.12);--text:#eef3ff;--muted:#95a0bd;--accent:#ff2fb3;--cyan:#29d8ff}
  *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02030a;color:var(--text);font:13px/1.35 Inter,Segoe UI,system-ui,sans-serif}
  canvas{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair;background:radial-gradient(circle at 50% 40%,#101225,#02030a 68%)}
  #ui{position:fixed;left:14px;top:14px;width:min(390px,calc(100vw - 28px));max-height:calc(100vh - 28px);overflow:auto;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:0 22px 70px rgba(0,0,0,.55);backdrop-filter:blur(16px);z-index:4}
  #ui.collapsed{display:none}.brand{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}.brand h1{font-size:17px;line-height:1.1;margin:0;letter-spacing:.2px}.pill{font-size:11px;color:#061018;background:linear-gradient(90deg,var(--cyan),var(--accent));padding:4px 8px;border-radius:999px;font-weight:800}.hint{font-size:12px;color:var(--muted);margin:6px 0 10px}.section{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.section h2{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:#c8d3ef;margin:0 0 7px}.row{display:grid;grid-template-columns:122px 1fr 54px;gap:9px;align-items:center;margin:7px 0}.row label{color:#dce5ff}.row input[type=range]{width:100%;accent-color:var(--accent)}.row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}.row select{width:100%;border-radius:8px;border:1px solid var(--line);background:#121626;color:var(--text);padding:5px}.row .val{text-align:right;color:#aeb9d8;font-variant-numeric:tabular-nums}.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.check{display:flex;align-items:center;gap:7px;color:#dce5ff}.buttons{display:flex;gap:7px;flex-wrap:wrap}.btn,#toggle{border:1px solid var(--line);background:linear-gradient(180deg,#20263a,#111522);color:var(--text);border-radius:10px;padding:7px 9px;cursor:pointer}.btn:hover,#toggle:hover{border-color:rgba(255,255,255,.27);transform:translateY(-1px)}#toggle{position:fixed;right:14px;top:14px;z-index:6;background:rgba(8,10,18,.76);backdrop-filter:blur(12px)}#stats{position:fixed;left:14px;bottom:12px;color:#aeb9d8;background:rgba(2,3,10,.52);border:1px solid var(--line);border-radius:12px;padding:7px 9px;pointer-events:none;font-variant-numeric:tabular-nums;z-index:3}.kbd{font-family:ui-monospace,Consolas,monospace;background:rgba(255,255,255,.1);border:1px solid var(--line);border-radius:5px;padding:1px 4px;color:#fff}#toast{position:fixed;right:14px;bottom:14px;max-width:340px;padding:10px 12px;border-radius:13px;background:rgba(8,10,18,.82);border:1px solid var(--line);box-shadow:0 18px 50px rgba(0,0,0,.5);color:#dfe8ff;opacity:0;transform:translateY(12px);transition:.22s;z-index:7}#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button id="toggle">☰ Controls</button>
<div id="stats">starting…</div>
<div id="toast"></div>
<div id="ui">
  <div class="brand"><h1>Interactive Fluid Lab</h1><span class="pill">CPU Stable Fluids</span></div>
  <div class="hint"><b>Drag</b> to push and paint. <b>Right-drag</b> pushes without dye. <span class="kbd">Space</span> pause, <span class="kbd">R</span> reset, <span class="kbd">H</span> hide UI, <span class="kbd">E</span> emitters.</div>
  <div id="controls"></div>
</div>
<script>
'use strict';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {alpha:false, willReadFrequently:false});
const stats = document.getElementById('stats');
const toastEl = document.getElementById('toast');
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>toastEl.classList.remove('show'),1600)}
const P = {
  N:128, scaleMode:'stretch', dt:0.07, iterations:10, viscosity:0.00002, diffusion:0.00001,
  velocityFade:0.996, dyeFade:0.992, pressure:1.0, vorticity:0.18, turbulence:0.0,
  gravityX:0, gravityY:0, buoyancy:0.04, wrapEdges:false,
  brushRadius:0.045, brushForce:70, dyeAmount:36, splatSoftness:1.2, brushMode:'paint', rightDragDye:false,
  hue:202, saturation:0.95, value:1.0, rainbow:true, rainbowSpeed:0.42, velocityColor:0.42, eraseStrength:0.65,
  emitters:false, emitterCount:3, emitterRate:12, emitterOrbit:0.23, emitterSpin:0.8,
  display:'dye', exposure:1.18, contrast:1.12, glow:0.28, background:0.016, vignette:true, grid:false, vectors:false, vectorDensity:18, vectorScale:0.8, trails:0.72,
  paused:false
};
const specs = [
 ['Simulation','N','Grid resolution','range',48,224,8,0],['','dt','Time step','range',0.02,0.35,0.01,2],['','iterations','Solver iterations','range',2,32,1,0],['','pressure','Projection strength','range',0.2,1.8,0.01,2],['','scaleMode','Canvas fit','select',['cover','contain','stretch']],
 ['Physics','viscosity','Viscosity','range',0,0.001,0.00001,5],['','diffusion','Dye diffusion','range',0,0.001,0.00001,5],['','velocityFade','Velocity retain','range',0.94,1,0.001,3],['','dyeFade','Dye retain','range',0.94,1,0.001,3],['','vorticity','Vorticity swirl','range',0,1.2,0.01,2],['','turbulence','Noise turbulence','range',0,2,0.01,2],['','gravityX','Gravity X','range',-1,1,0.01,2],['','gravityY','Gravity Y','range',-1,1,0.01,2],['','buoyancy','Buoyancy','range',-0.5,0.5,0.01,2],['','wrapEdges','Wrap edges','check'],
 ['Brush','brushRadius','Brush radius','range',0.005,0.18,0.001,3],['','brushForce','Push force','range',1,260,1,0],['','dyeAmount','Dye amount','range',0,120,1,0],['','splatSoftness','Brush softness','range',0.4,4,0.01,2],['','brushMode','Brush mode','select',['paint','velocity only','dye only','erase']],['','rightDragDye','Right drag paints','check'],
 ['Color','hue','Hue','range',0,360,1,0],['','saturation','Saturation','range',0,1,0.01,2],['','value','Brightness','range',0,2.5,0.01,2],['','rainbow','Rainbow cycle','check'],['','rainbowSpeed','Cycle speed','range',0,2,0.01,2],['','velocityColor','Velocity color mix','range',0,1,0.01,2],['','eraseStrength','Erase strength','range',0.05,2,0.01,2],
 ['Emitters','emitters','Auto emitters','check'],['','emitterCount','Emitter count','range',1,10,1,0],['','emitterRate','Emitter strength','range',1,40,1,0],['','emitterOrbit','Emitter orbit','range',0,0.45,0.01,2],['','emitterSpin','Emitter spin','range',0,3,0.01,2],
 ['Display','display','View','select',['dye','velocity','pressure','curl']],['','exposure','Exposure','range',0.2,4,0.01,2],['','contrast','Contrast','range',0.4,2.5,0.01,2],['','glow','Glow','range',0,1.2,0.01,2],['','background','Background lift','range',0,0.18,0.001,3],['','trails','Motion trails','range',0,0.96,0.01,2],['','vignette','Vignette','check'],['','grid','Grid overlay','check'],['','vectors','Velocity vectors','check'],['','vectorDensity','Vector density','range',6,42,1,0],['','vectorScale','Vector scale','range',0.1,3,0.01,2]
];
const controls=document.getElementById('controls');
function buildControls(){let section='';for(const s of specs){const [sec,key,label,type,a,b,c,d]=s;if(sec&&sec!==section){controls.insertAdjacentHTML('beforeend',`<div class="section"><h2>${sec}</h2></div>`);section=sec}const host=controls.lastElementChild;if(type==='range')host.insertAdjacentHTML('beforeend',`<div class="row"><label for="${key}">${label}</label><input id="${key}" type="range" min="${a}" max="${b}" step="${c}" value="${P[key]}"><span class="val" id="${key}v"></span></div>`);else if(type==='check')host.insertAdjacentHTML('beforeend',`<label class="check"><input id="${key}" type="checkbox" ${P[key]?'checked':''}> ${label}</label>`);else host.insertAdjacentHTML('beforeend',`<div class="row"><label for="${key}">${label}</label><select id="${key}">${a.map(x=>`<option ${P[key]===x?'selected':''}>${x}</option>`).join('')}</select><span></span></div>`)}controls.insertAdjacentHTML('beforeend','<div class="section"><h2>Actions</h2><div class="buttons"><button class="btn" id="seed">Seed Plumes</button><button class="btn" id="reset">Reset</button><button class="btn" id="silk">Silk</button><button class="btn" id="storm">Storm</button><button class="btn" id="smoke">Smoke</button><button class="btn" id="ink">Ink</button></div></div>')}
buildControls();
let resizeGridPending=false;
function syncControl(s){const [,key,,type,,,,digits=2]=s;const el=document.getElementById(key), val=document.getElementById(key+'v');function update(){if(type==='range')P[key]=parseFloat(el.value);else if(type==='check')P[key]=el.checked;else P[key]=el.value;if(val)val.textContent=(+P[key]).toFixed(digits);if(key==='N')resizeGridPending=true}el.addEventListener(type==='range'?'input':'change',update);update()}
specs.forEach(syncControl);
function setParam(k,v){P[k]=v;const el=document.getElementById(k);if(!el)return;if(el.type==='checkbox')el.checked=v;else el.value=v;el.dispatchEvent(new Event(el.type==='range'?'input':'change'))}
function idx(x,y){return x + (N+2)*y} let N=0, size=0, u,v,u0,v0,r,g,b,r0,g0,b0, div,p,curl,img, off;
function alloc(){N=P.N|0;size=(N+2)*(N+2);u=new Float32Array(size);v=new Float32Array(size);u0=new Float32Array(size);v0=new Float32Array(size);r=new Float32Array(size);g=new Float32Array(size);b=new Float32Array(size);r0=new Float32Array(size);g0=new Float32Array(size);b0=new Float32Array(size);div=new Float32Array(size);p=new Float32Array(size);curl=new Float32Array(size);off=document.createElement('canvas');off.width=N;off.height=N;img=new ImageData(N,N);resizeGridPending=false;seedPlumes(8)}
function setBnd(a,bnd){if(P.wrapEdges){for(let i=1;i<=N;i++){a[idx(0,i)]=a[idx(N,i)];a[idx(N+1,i)]=a[idx(1,i)];a[idx(i,0)]=a[idx(i,N)];a[idx(i,N+1)]=a[idx(i,1)]}}else{for(let i=1;i<=N;i++){a[idx(0,i)]=bnd===1?-a[idx(1,i)]:a[idx(1,i)];a[idx(N+1,i)]=bnd===1?-a[idx(N,i)]:a[idx(N,i)];a[idx(i,0)]=bnd===2?-a[idx(i,1)]:a[idx(i,1)];a[idx(i,N+1)]=bnd===2?-a[idx(i,N)]:a[idx(i,N)]}}a[idx(0,0)]=.5*(a[idx(1,0)]+a[idx(0,1)]);a[idx(0,N+1)]=.5*(a[idx(1,N+1)]+a[idx(0,N)]);a[idx(N+1,0)]=.5*(a[idx(N,0)]+a[idx(N+1,1)]);a[idx(N+1,N+1)]=.5*(a[idx(N,N+1)]+a[idx(N+1,N)])}
function linSolve(x,x0,a,c,bnd){const inv=1/c;for(let k=0;k<P.iterations;k++){for(let j=1;j<=N;j++)for(let i=1;i<=N;i++)x[idx(i,j)]=(x0[idx(i,j)]+a*(x[idx(i-1,j)]+x[idx(i+1,j)]+x[idx(i,j-1)]+x[idx(i,j+1)]))*inv;setBnd(x,bnd)}}
function diffuse(x,x0,diff,bnd,dt){const a=dt*diff*N*N;linSolve(x,x0,a,1+4*a,bnd)}
function advect(d,d0,uu,vv,bnd,dt){const dt0=dt*N;for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){let x=i-dt0*uu[idx(i,j)], y=j-dt0*vv[idx(i,j)];if(P.wrapEdges){x=((x-1)%N+N)%N+1;y=((y-1)%N+N)%N+1}else{x=Math.max(.5,Math.min(N+.5,x));y=Math.max(.5,Math.min(N+.5,y))}const i0=Math.floor(x), i1=i0+1, j0=Math.floor(y), j1=j0+1, s1=x-i0, s0=1-s1, t1=y-j0, t0=1-t1;d[idx(i,j)]=s0*(t0*d0[idx(i0,j0)]+t1*d0[idx(i0,j1)])+s1*(t0*d0[idx(i1,j0)]+t1*d0[idx(i1,j1)])}setBnd(d,bnd)}
function projectVel(uu,vv){for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){div[idx(i,j)]=-.5*(uu[idx(i+1,j)]-uu[idx(i-1,j)]+vv[idx(i,j+1)]-vv[idx(i,j-1)])/N;p[idx(i,j)]=0}setBnd(div,0);setBnd(p,0);linSolve(p,div,1,4,0);for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){uu[idx(i,j)]-=P.pressure*.5*N*(p[idx(i+1,j)]-p[idx(i-1,j)]);vv[idx(i,j)]-=P.pressure*.5*N*(p[idx(i,j+1)]-p[idx(i,j-1)])}setBnd(uu,1);setBnd(vv,2)}
function computeCurl(){for(let j=1;j<=N;j++)for(let i=1;i<=N;i++)curl[idx(i,j)]=.5*(v[idx(i+1,j)]-v[idx(i-1,j)]-u[idx(i,j+1)]+u[idx(i,j-1)])}
function vorticity(dt){if(P.vorticity<=0)return;computeCurl();for(let j=2;j<N;j++)for(let i=2;i<N;i++){const c=Math.abs(curl[idx(i,j)]), dx=Math.abs(curl[idx(i+1,j)])-Math.abs(curl[idx(i-1,j)]), dy=Math.abs(curl[idx(i,j+1)])-Math.abs(curl[idx(i,j-1)]);const len=Math.hypot(dx,dy)+1e-5;u[idx(i,j)]+=P.vorticity*dt*(dy/len)*c*N*.12;v[idx(i,j)]-=P.vorticity*dt*(dx/len)*c*N*.12}setBnd(u,1);setBnd(v,2)}
function applyForces(dt){for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){const id=idx(i,j), den=(r[id]+g[id]+b[id])*.333;u[id]+=P.gravityX*dt+P.turbulence*(Math.random()-.5)*dt;v[id]+=P.gravityY*dt-P.buoyancy*den*dt*.02+P.turbulence*(Math.random()-.5)*dt;u[id]*=P.velocityFade;v[id]*=P.velocityFade;r[id]*=P.dyeFade;g[id]*=P.dyeFade;b[id]*=P.dyeFade}}
function step(){applyForces(P.dt);vorticity(P.dt);u0.set(u);v0.set(v);diffuse(u,u0,P.viscosity,1,P.dt);diffuse(v,v0,P.viscosity,2,P.dt);projectVel(u,v);u0.set(u);v0.set(v);advect(u,u0,u0,v0,1,P.dt);advect(v,v0,u0,v0,2,P.dt);projectVel(u,v);r0.set(r);g0.set(g);b0.set(b);diffuse(r,r0,P.diffusion,0,P.dt);diffuse(g,g0,P.diffusion,0,P.dt);diffuse(b,b0,P.diffusion,0,P.dt);r0.set(r);g0.set(g);b0.set(b);advect(r,r0,u,v,0,P.dt);advect(g,g0,u,v,0,P.dt);advect(b,b0,u,v,0,P.dt)}
function hsv(h,s,val){let f=(n,k=(n+h/60)%6)=>val-val*s*Math.max(Math.min(k,4-k,1),0);return [f(5),f(3),f(1)]}
function addSplat(nx,ny,dx,dy,right=false){const cx=Math.max(1,Math.min(N,Math.floor(nx*N)+1)), cy=Math.max(1,Math.min(N,Math.floor((1-ny)*N)+1));const rad=Math.max(1,P.brushRadius*N), rr=rad*rad, mode=P.brushMode;let hue=(P.hue+(P.rainbow?performance.now()*P.rainbowSpeed*.05:0)+Math.hypot(dx,dy)*.3)%360;const col=hsv(hue,P.saturation,P.value), dyeSign=mode==='erase'?-P.eraseStrength:1;for(let y=Math.max(1,Math.floor(cy-rad*2));y<=Math.min(N,Math.ceil(cy+rad*2));y++)for(let x=Math.max(1,Math.floor(cx-rad*2));x<=Math.min(N,Math.ceil(cx+rad*2));x++){const q=((x-cx)*(x-cx)+(y-cy)*(y-cy))/rr, w=Math.exp(-q*P.splatSoftness);const id=idx(x,y);if(mode!=='dye only' && mode!=='erase'){u[id]+=dx*P.brushForce*w;v[id]-=dy*P.brushForce*w}if(mode!=='velocity only' && (!right||P.rightDragDye)){r[id]+=col[0]*P.dyeAmount*w*dyeSign;g[id]+=col[1]*P.dyeAmount*w*dyeSign;b[id]+=col[2]*P.dyeAmount*w*dyeSign}}}
const pointers=new Map();function point(e){const rect=canvas.getBoundingClientRect();return {x:(e.clientX-rect.left)/rect.width,y:(e.clientY-rect.top)/rect.height}}
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);const p=point(e);p.px=p.x;p.py=p.y;p.button=e.button;pointers.set(e.pointerId,p);addSplat(p.x,p.y,0,0,e.button===2);e.preventDefault()});
canvas.addEventListener('pointermove',e=>{const p=pointers.get(e.pointerId);if(!p)return;const q=point(e);addSplat(q.x,q.y,q.x-p.x,q.y-p.y,p.button===2);p.x=q.x;p.y=q.y;e.preventDefault()});
function up(e){pointers.delete(e.pointerId)}canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);canvas.addEventListener('contextmenu',e=>e.preventDefault());
function emit(now){if(!P.emitters)return;const n=P.emitterCount|0;for(let i=0;i<n;i++){const a=now*.001*P.emitterSpin+i*Math.PI*2/n, x=.5+Math.cos(a)*P.emitterOrbit, y=.5+Math.sin(a*1.31)*P.emitterOrbit;addSplat(x,y,-Math.sin(a)*P.emitterRate*.00035,Math.cos(a)*P.emitterRate*.00035,false)}}
function seedPlumes(count=12){for(let i=0;i<count;i++){addSplat(Math.random()*.86+.07,Math.random()*.8+.1,(Math.random()-.5)*.008,(Math.random()-.5)*.008,false)}toast('Seeded plumes')}
function resizeCanvas(){const dpr=Math.min(devicePixelRatio||1,2);const w=Math.floor(innerWidth*dpr),h=Math.floor(innerHeight*dpr);if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;ctx.setTransform(1,0,0,1,0,0)}}
function tone(x){x=Math.max(0,x*P.exposure);x=1-Math.exp(-x);x=(x-.5)*P.contrast+.5;return Math.max(0,Math.min(255,x*255))}
function render(){const data=img.data;computeCurl();let k=0;for(let y=1;y<=N;y++)for(let x=1;x<=N;x++){const id=idx(x,y);let cr=r[id],cg=g[id],cb=b[id];if(P.display==='velocity'){const m=Math.hypot(u[id],v[id])*.018, hh=(Math.atan2(v[id],u[id])/Math.PI/2+.5)*360;[cr,cg,cb]=hsv(hh,.9,Math.min(2,m))}else if(P.display==='pressure'){const vv=(p[id]*.5+.5);cr=vv*1.8;cg=vv*.35;cb=1.2-vv}else if(P.display==='curl'){const vv=Math.abs(curl[id])*.04;cr=vv*.2;cg=vv*1.2;cb=vv*1.8}else if(P.velocityColor>0){const m=Math.hypot(u[id],v[id])*.006, vc=hsv((P.hue+m*120)%360,P.saturation,Math.min(2,m));cr=cr*(1-P.velocityColor)+(cr*vc[0]+vc[0]*m)*P.velocityColor;cg=cg*(1-P.velocityColor)+(cg*vc[1]+vc[1]*m)*P.velocityColor;cb=cb*(1-P.velocityColor)+(cb*vc[2]+vc[2]*m)*P.velocityColor}const glow=P.glow*(r[id]+g[id]+b[id])*.02;data[k++]=tone(cr+glow+P.background);data[k++]=tone(cg+glow+P.background);data[k++]=tone(cb+glow+P.background);data[k++]=255}off.getContext('2d').putImageData(img,0,0);ctx.save();ctx.globalAlpha=1-P.trails;ctx.fillStyle=`rgb(${Math.floor(P.background*255)},${Math.floor(P.background*185)},${Math.floor(P.background*330)})`;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;let dw=canvas.width,dh=canvas.height,dx=0,dy=0;if(P.scaleMode!=='stretch'){const s=P.scaleMode==='contain'?Math.min(canvas.width/N,canvas.height/N):Math.max(canvas.width/N,canvas.height/N);dw=N*s;dh=N*s;dx=(canvas.width-dw)/2;dy=(canvas.height-dh)/2}ctx.imageSmoothingEnabled=true;ctx.drawImage(off,dx,dy,dw,dh);if(P.vignette){const grd=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*.65);grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,.62)');ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height)}if(P.grid){ctx.strokeStyle='rgba(115,175,255,.18)';ctx.lineWidth=1;for(let i=0;i<=24;i++){ctx.beginPath();ctx.moveTo(i*canvas.width/24,0);ctx.lineTo(i*canvas.width/24,canvas.height);ctx.moveTo(0,i*canvas.height/24);ctx.lineTo(canvas.width,i*canvas.height/24);ctx.stroke()}}if(P.vectors){ctx.strokeStyle='rgba(235,245,255,.5)';ctx.lineWidth=1;const stepv=Math.max(2,Math.floor(N/P.vectorDensity));for(let y=2;y<N;y+=stepv)for(let x=2;x<N;x+=stepv){const id=idx(x,y), px=(x-.5)/N*canvas.width, py=(y-.5)/N*canvas.height, vx=u[id]*P.vectorScale*.16, vy=-v[id]*P.vectorScale*.16;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+vx,py+vy);ctx.stroke()}}ctx.restore()}
function reset(){alloc();toast('Fluid reset')}document.getElementById('reset').onclick=reset;document.getElementById('seed').onclick=()=>seedPlumes(18);document.getElementById('silk').onclick=()=>{Object.entries({vorticity:.28,velocityFade:.998,dyeFade:.997,brushRadius:.03,brushForce:45,glow:.46,rainbow:true,display:'dye'}).forEach(([k,v])=>setParam(k,v));toast('Preset: silk')};document.getElementById('storm').onclick=()=>{Object.entries({vorticity:.85,velocityFade:.987,dyeFade:.988,brushRadius:.075,brushForce:160,glow:.58,emitters:true,emitterCount:5,emitterRate:25,turbulence:.35}).forEach(([k,v])=>setParam(k,v));toast('Preset: storm')};document.getElementById('smoke').onclick=()=>{Object.entries({vorticity:.42,velocityFade:.996,dyeFade:.995,saturation:.18,value:2.0,velocityColor:.04,glow:.12,background:.035}).forEach(([k,v])=>setParam(k,v));toast('Preset: smoke')};document.getElementById('ink').onclick=()=>{Object.entries({diffusion:.00018,dyeFade:.999,velocityFade:.993,saturation:1,value:1.1,brushRadius:.02,brushForce:80,glow:.05,background:.006}).forEach(([k,v])=>setParam(k,v));toast('Preset: ink')};document.getElementById('toggle').onclick=()=>document.getElementById('ui').classList.toggle('collapsed');
window.addEventListener('keydown',e=>{if(['INPUT','SELECT'].includes(e.target.tagName))return;const k=e.key.toLowerCase();if(e.code==='Space'){P.paused=!P.paused;toast(P.paused?'Paused':'Running')}if(k==='r')reset();if(k==='h')document.getElementById('ui').classList.toggle('collapsed');if(k==='e'){setParam('emitters',!P.emitters);toast(P.emitters?'Emitters on':'Emitters off')}});
let frames=0,lastStat=performance.now();function loop(now){requestAnimationFrame(loop);resizeCanvas();if(resizeGridPending)alloc();emit(now);if(!P.paused)step();render();frames++;if(now-lastStat>1000){stats.textContent=`${frames} FPS | grid ${N}² | ${P.display} | ${pointers.size} pointer${pointers.size===1?'':'s'}`;frames=0;lastStat=now}if(P.rainbow){P.hue=(P.hue+P.rainbowSpeed)%360;const h=document.getElementById('hue');h.value=P.hue;document.getElementById('huev').textContent=P.hue.toFixed(0)}}
resizeCanvas();alloc();requestAnimationFrame(loop);
</script>
